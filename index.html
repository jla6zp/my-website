<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Jared Arnold Photography</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="Home-Background">

        <div id="loadingScreen">
            <img class="LoadingLogo" src="Images/Filtered Logo.png" />
            <div class="LoadingText">Loading...</div>
        </div>

        <header>
            <div>
                <h1>Not all those who wander are lost</h1>
                <p>-J.R.R. Tolkien</p>
            </div>
        </header>
        <div class="panel-layout">
            
            <div class="panel">
                <div class="projects-bar">
                    <div class="horizontal-line"></div>
                    <a class="menu-text" href="Projects.html">PROJECTS</a>
                </div>
                <div class="backdrop-overlay left-backdrop">
                    <video class="waterSim" autoplay muted loop playsinline>
                        <source src="Videos/WaterSim.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="image-overlay projects-bar-overlay"></div>
            </div>
            
            <div class="panel centered">
                <div class="about-area">
                    <a class="menu-text pointer sibling-hover" href="About.html">ABOUT</a>
                    <div class="vertical-container pointer sibling-hover">
                        <div class="vertical-line"></div>
                    </div>
                </div>
                <div class="backdrop-overlay center-backdrop"></div>
                <div class="image-overlay about-area-overlay"></div>
            </div>
            
            <div class="panel">
                <div class="photos-bar">
                    <a class="menu-text" href="PhotoList.html">PHOTOS</a>
                    <div class="horizontal-line"></div>
                </div>
                <div class="backdrop-overlay right-backdrop"></div>
                <div class="image-overlay photos-bar-overlay"></div>
            </div>
        </div>
        <script>
            (function () {
                const screen = document.getElementById('loadingScreen');

                function dismiss() {
                    screen.classList.add('fade-out');
                    screen.addEventListener('transitionend', () => screen.remove(), { once: true });
                }

                const img = new Image();
                img.onload = dismiss;
                img.onerror = dismiss;
                img.src = 'Images/Iceland_Home.png';

                if (img.complete) dismiss();
            })();
        </script>
    </body>
</html>
