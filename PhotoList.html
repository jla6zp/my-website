<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Photos — Jared Arnold</title>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap');

        html, body {
            min-height: 100vh;
            min-width: 100vw;
            margin: 0;
            background: #060d14;
            overflow: hidden;
        }

        /* ---- Loading Screen ---- */
        #loadingScreen {
            position: fixed;
            inset: 0;
            background-color: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        #loadingScreen.fade-out { opacity: 0; pointer-events: none; }
        .LoadingLogo {
            width: 160px; height: 160px; object-fit: contain; margin-bottom: 24px;
            filter: brightness(0) saturate(100%) invert(91%) sepia(58%) saturate(4121%) hue-rotate(172deg) brightness(106%) contrast(97%);
        }
        .LoadingText {
            font-family: "Google Sans", sans-serif; font-size: 14px;
            letter-spacing: 4px; color: rgba(190, 228, 251, 0.8);
            animation: loadingPulse 1.6s ease-in-out infinite;
        }
        @keyframes loadingPulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* ---- Aurora canvas ---- */
        #auroraCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* Gradient that fades the aurora out before it reaches the gallery */
        #auroraFade {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom,
                transparent 0%,
                transparent 20%,
                rgba(6, 13, 20, 0.7) 42%,
                rgba(6, 13, 20, 0.96) 58%,
                #060d14 72%
            );
            pointer-events: none;
            z-index: 1;
        }

        /* ---- Contact ---- */
        .ContactWrapper {
            position: absolute; top: 50px; left: 0;
            display: inline-flex; justify-content: flex-start;
            align-items: center; gap: 10px;
            cursor: pointer; text-decoration: none; z-index: 100;
        }
        .ContactLine {
            height: 2px; width: 30px; background-color: #bee4fb;
            flex-shrink: 0; transition: width 0.3s ease;
        }
        .ContactWrapper:hover .ContactLine { width: 60px; }
        .ContactText { font-family: "Google Sans", sans-serif; font-size: 20px; color: #bee4fb; }

        /* ---- Menu ---- */
        .MenuContainer {
            position: absolute; top: 50px; right: 30px;
            display: flex; flex-direction: row-reverse;
            align-items: center; z-index: 100;
        }
        .MenuWrapper {
            display: inline-flex; justify-content: flex-end;
            align-items: center; cursor: pointer; gap: 10px;
        }
        .MenuLineWrapper {
            display: inline-flex; flex-direction: column;
            justify-content: flex-start; gap: 2px;
        }
        .MenuLine { height: 2px; width: 30px; background-color: #bee4fb; }
        .MenuText { font-family: "Google Sans", sans-serif; font-size: 20px; color: #bee4fb; }
        .MenuDropdown {
            display: flex; flex-direction: row; align-items: center;
            max-width: 0; overflow: hidden; opacity: 0;
            white-space: nowrap; transition: max-width 0.35s ease, opacity 0.3s ease;
        }
        .MenuDropdown.open { max-width: 400px; opacity: 1; }
        .MenuNavItem {
            font-family: "Google Sans", sans-serif; font-size: 16px;
            letter-spacing: 1px; color: #bee4fb; text-decoration: none;
            padding: 0 18px; transition: color 0.2s ease;
        }
        .MenuNavItem:hover { color: #ffffff; }

        /* ---- Page title above gallery ---- */
        .PageTitle {
            position: absolute;
            top: calc(50% - 37.5vh - 56px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 10;
            pointer-events: none;
        }
        .PageTitle-Line {
            width: clamp(40px, 5vw, 80px);
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(190,228,251,0.3));
        }
        .PageTitle-Line--right {
            background: linear-gradient(to left, transparent, rgba(190,228,251,0.3));
        }
        .PageTitle-Text {
            font-family: "Google Sans", sans-serif;
            font-size: 11px;
            letter-spacing: 6px;
            color: rgba(190, 228, 251, 0.4);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ---- Gallery ---- */
        .Gallery {
            position: absolute;
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            grid-auto-flow: column;
            gap: 5px;
            width: 75vw;
            height: 75vh;
            overflow: hidden;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .GalleryImage {
            height: 25vh;
            width: 32vh;
            object-fit: cover;
            cursor: zoom-in;
        }

        /* ---- Scroll Arrows ---- */
        .ScrollArrow {
            position: absolute; top: 50%;
            transform: translateY(-50%);
            width: 70px; height: 37.5vh;
            border: 1.5px solid rgba(190, 228, 251, 0.18);
            display: flex; align-items: center;
            justify-content: center; cursor: pointer;
            z-index: 10;
            transition: border-color 0.25s ease, background-color 0.25s ease, opacity 0.3s ease;
        }
        .ScrollArrow:hover {
            border-color: rgba(190, 228, 251, 0.5);
            background-color: rgba(190, 228, 251, 0.03);
        }
        .ScrollArrowLeft  { left: calc(12.5vw - 75px); }
        .ScrollArrowRight { left: calc(87.5vw + 5px); }

        .ArrowTriangle { width: 0; height: 0; border-style: solid; opacity: 0.45; transition: opacity 0.25s ease; }
        .ScrollArrow:hover .ArrowTriangle { opacity: 0.9; }
        .ArrowTriangleLeft  { border-width: 12px 18px 12px 0; border-color: transparent #bee4fb transparent transparent; margin-right: 4px; }
        .ArrowTriangleRight { border-width: 12px 0 12px 18px; border-color: transparent transparent transparent #bee4fb; margin-left: 4px; }

        /* ---- Scroll hints ---- */
        .ScrollHintLeft, .ScrollHintRight {
            position: absolute;
            top: calc(50% + 37.5vh + 12px);
            font-family: "Google Sans", sans-serif;
            font-size: 13px; letter-spacing: 3px;
            color: rgba(190, 228, 251, 0.4);
            cursor: default; user-select: none;
            transition: color 0.2s ease, opacity 0.3s ease;
            z-index: 10;
        }
        .ScrollArrow.hidden, .ScrollHintLeft.hidden, .ScrollHintRight.hidden {
            opacity: 0; pointer-events: none;
        }
        .ScrollHintLeft  { left: 12.5vw; }
        .ScrollHintRight { right: 12.5vw; }

        /* ---- Copyright ---- */
        .Copyright {
            position: absolute; bottom: 22px; right: 28px;
            font-family: "Google Sans", sans-serif;
            font-size: 12px; letter-spacing: 1px;
            color: rgba(190, 228, 251, 0.35);
            pointer-events: none; z-index: 10;
        }

        /* ---- Lightbox ---- */
        .Lightbox {
            position: fixed; inset: 0;
            background-color: rgba(0, 0, 0, 0.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; cursor: zoom-out;
        }
        .Lightbox.open { opacity: 1; pointer-events: all; }
        .LightboxImg {
            max-width: 90vw; max-height: 90vh;
            object-fit: contain; display: block; cursor: default;
            transform: scale(0.96);
            transition: transform 0.3s ease, opacity 0.25s ease;
        }
        .Lightbox.open .LightboxImg { transform: scale(1); }
        .LightboxClose {
            position: absolute; top: 24px; right: 30px;
            font-family: "Google Sans", sans-serif; font-size: 28px;
            color: rgba(190, 228, 251, 0.6); cursor: pointer;
            line-height: 1; transition: color 0.2s ease; user-select: none;
        }
        .LightboxClose:hover { color: #ffffff; }
        .LightboxArrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px; cursor: pointer;
            opacity: 0.5; transition: opacity 0.2s ease; flex-shrink: 0;
        }
        .LightboxArrow:hover { opacity: 1; }
        .LightboxArrow::before {
            content: ''; display: block; width: 22px; height: 22px;
            border-top: 2.5px solid #bee4fb; border-right: 2.5px solid #bee4fb;
            position: absolute; top: 50%; left: 50%;
        }
        .LightboxArrowLeft  { left: 24px; }
        .LightboxArrowLeft::before  { transform: translate(-20%, -50%) rotate(-135deg); }
        .LightboxArrowRight { right: 24px; }
        .LightboxArrowRight::before { transform: translate(-80%, -50%) rotate(45deg); }
        .LightboxArrow.hidden { opacity: 0; pointer-events: none; }
        .LightboxLoader {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            pointer-events: none; transition: opacity 0.3s ease;
        }
        .LightboxLoader.hidden { opacity: 0; }
        .LightboxLoaderLogo {
            width: 100px; height: 100px; object-fit: contain;
            filter: brightness(0) saturate(100%) invert(91%) sepia(58%) saturate(4121%) hue-rotate(172deg) brightness(106%) contrast(97%);
        }
        .LightboxLoaderText {
            font-family: "Google Sans", sans-serif; font-size: 13px;
            letter-spacing: 4px; color: rgba(190, 228, 251, 0.8);
            animation: loadingPulse 1.6s ease-in-out infinite;
        }
        </style>
    </head>
    <body>

        <div id="loadingScreen">
            <img class="LoadingLogo" src="Images/Filtered Logo.png" />
            <div class="LoadingText">Loading...</div>
        </div>

        <!-- Aurora background -->
        <canvas id="auroraCanvas"></canvas>
        <div id="auroraFade"></div>

        <!-- Nav -->
        <a class="ContactWrapper" href="Contact.html">
            <div class="ContactLine"></div>
            <div class="ContactText">Contact</div>
        </a>

        <div class="MenuContainer" id="menuContainer">
            <div class="MenuWrapper" id="menuToggle">
                <div class="MenuText">Menu</div>
                <div class="MenuLineWrapper">
                    <div class="MenuLine"></div>
                    <div class="MenuLine"></div>
                    <div class="MenuLine"></div>
                </div>
            </div>
            <div class="MenuDropdown" id="menuDropdown">
                <a href="index.html"    class="MenuNavItem">Home</a>
                <a href="Projects.html" class="MenuNavItem">Portfolio</a>
                <a href="About.html"    class="MenuNavItem">About</a>
            </div>
        </div>

        <!-- Page label above gallery -->
        <div class="PageTitle">
            <div class="PageTitle-Line"></div>
            <div class="PageTitle-Text">Photography</div>
            <div class="PageTitle-Line PageTitle-Line--right"></div>
        </div>

        <!-- Gallery -->
        <div class="Gallery" id="gallery"></div>

        <!-- Scroll controls -->
        <div class="ScrollArrow ScrollArrowLeft" id="scrollLeft">
            <div class="ArrowTriangle ArrowTriangleLeft"></div>
        </div>
        <div class="ScrollArrow ScrollArrowRight" id="scrollRight">
            <div class="ArrowTriangle ArrowTriangleRight"></div>
        </div>
        <div class="ScrollHintLeft"  id="hoverScrollLeft">&#8592;&#8212;&#8212; SCROLL</div>
        <div class="ScrollHintRight" id="hoverScrollRight">SCROLL &#8212;&#8212;&#8594;</div>

        <div class="Copyright">&#169; Jared Arnold</div>

        <script>
        // ---- Aurora (bands stay in top portion, fade handled by CSS gradient overlay) ----
        const auroraCanvas = document.getElementById('auroraCanvas');
        const actx = auroraCanvas.getContext('2d');

        let stars = [];
        function initStars() {
            stars = Array.from({ length: 160 }, () => ({
                x: Math.random(), y: Math.random() * 0.45,
                r: Math.random() * 0.9 + 0.2,
                opacity: Math.random() * 0.45 + 0.1,
                phase: Math.random() * Math.PI * 2,
                speed: Math.random() * 1.5 + 0.4,
            }));
        }

        // Bands positioned in upper portion of screen only
        const BANDS = [
            { rgb: [34,  211, 238], base: 0.22, amp: 0.055, freq: 1.9, spd: 0.28, spread: 0.085, opacity: 0.60, phase: 0.00 },
            { rgb: [13,  148, 136], base: 0.30, amp: 0.070, freq: 2.5, spd: 0.18, spread: 0.095, opacity: 0.48, phase: 1.10 },
            { rgb: [52,  211, 153], base: 0.16, amp: 0.042, freq: 3.3, spd: 0.44, spread: 0.060, opacity: 0.40, phase: 2.30 },
            { rgb: [129, 140, 248], base: 0.36, amp: 0.060, freq: 1.4, spd: 0.13, spread: 0.110, opacity: 0.30, phase: 0.70 },
            { rgb: [190, 228, 251], base: 0.26, amp: 0.035, freq: 3.0, spd: 0.53, spread: 0.048, opacity: 0.32, phase: 3.80 },
            { rgb: [96,  165, 250], base: 0.32, amp: 0.075, freq: 1.2, spd: 0.10, spread: 0.120, opacity: 0.25, phase: 5.10 },
        ];

        function getY(t, H, band, time) {
            return H * band.base
                + Math.sin(t * Math.PI * 2 * band.freq        + time * band.spd        + band.phase      ) * H * band.amp
                + Math.sin(t * Math.PI * 2 * band.freq * 0.73 + time * band.spd * 1.37 + band.phase + 1.3) * H * band.amp * 0.38
                + Math.sin(t * Math.PI * 2 * band.freq * 1.57 + time * band.spd * 0.82 + band.phase + 2.6) * H * band.amp * 0.18;
        }

        function drawBand(W, H, band, time) {
            const [r, g, b] = band.rgb;
            const spread = band.spread * H;
            const N = 100;
            const pts = [];
            for (let i = 0; i <= N; i++) { const t = i / N; pts.push([t * W, getY(t, H, band, time)]); }
            const passes = [
                { w: spread * 3.0, a: band.opacity * 0.10 },
                { w: spread * 1.5, a: band.opacity * 0.35 },
                { w: spread * 0.5, a: band.opacity * 0.90 },
            ];
            actx.save();
            actx.globalCompositeOperation = 'screen';
            actx.filter = `blur(${Math.round(spread * 0.55)}px)`;
            actx.lineCap = 'round';
            for (const pass of passes) {
                actx.beginPath();
                actx.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i <= N; i++) actx.lineTo(pts[i][0], pts[i][1]);
                actx.strokeStyle = `rgba(${r},${g},${b},${pass.a.toFixed(3)})`;
                actx.lineWidth = pass.w;
                actx.stroke();
            }
            actx.restore();
        }

        function drawStars(W, H, time) {
            actx.save();
            actx.globalCompositeOperation = 'screen';
            for (const s of stars) {
                const alpha = s.opacity * (0.6 + 0.4 * Math.sin(time * s.speed + s.phase));
                actx.fillStyle = `rgba(190,228,251,${alpha.toFixed(3)})`;
                actx.beginPath();
                actx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                actx.fill();
            }
            actx.restore();
        }

        function resizeAurora() {
            auroraCanvas.width  = window.innerWidth;
            auroraCanvas.height = window.innerHeight;
        }

        const FRAME_MS = 1000 / 30;
        let lastFrame = 0;
        function renderAurora(ts) {
            requestAnimationFrame(renderAurora);
            const elapsed = ts - lastFrame;
            if (elapsed < FRAME_MS) return;
            lastFrame = ts - (elapsed % FRAME_MS);
            const W = auroraCanvas.width, H = auroraCanvas.height;
            const bg = actx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0,   '#020709');
            bg.addColorStop(0.5, '#050d16');
            bg.addColorStop(1,   '#060d14');
            actx.fillStyle = bg;
            actx.fillRect(0, 0, W, H);
            drawStars(W, H, ts * 0.001);
            for (const band of BANDS) drawBand(W, H, band, ts * 0.001);
        }
        window.addEventListener('resize', resizeAurora);
        resizeAurora();
        initStars();
        requestAnimationFrame(renderAurora);
        </script>

        <script src="PhotoPage/PhotoLoader.js?v=2"></script>
        <script src="script.js"></script>

    </body>
</html>
